    <div id="players-cards-details"></div>

    <div class="action-buttons">

      <div id="suspicion-modal" class="modal hidden">
        <div class="modal-content">
          <h2>Suspicion</h2>
          <p id="suspicion-text"></p>
          <p id="suspicion-status"></p>

          <div id="revealed-card" class="revealed-card hidden"></div>

          <button id="close-modal">OK</button>
        </div>
      </div>

      <button id="accuse-button">🔍<span class="tooltip">Accuse</span></button>
      <button id="dice-button">🎲<span class="tooltip">Roll Dice</span></button>
      <button id="pass-button">
        &gt;&gt;<span class="tooltip">Pass</span>
      </button>
    </div>

    <div class="popup">
      <div class="popup-dot"></div>
      <p></p>
    </div>

    <div id="tooltip" class="tooltip hidden"></div>

    <template id="player-template">
      <div class="player">
        <div class="player-icon"></div>
        <div class="player-info">
          <span class="player-name"></span>
          <span class="player-pawn"></span>
        </div>
      </div>
    </template>

    <template id="card-template">
      <div class="card">
        <span class="card-name"></span>
      </div>
    </template>
    <template id="suspicion-model-temp">
      <div id="suspicion-container">
        <h2>Suspicion</h2>
        <p class="modal-room-label"></p>
        <div class="suspicion-cards">
          <div class="sus-card" id="card-suspect">
            <span class="card-label">Suspect</span>
            <span class="card-value"></span>
          </div>
          <div class="sus-card" id="card-weapon">
            <span class="card-label">Weapon</span>
            <span class="card-value"></span>
          </div>
          <div class="sus-card" id="card-room">
            <span class="card-label">Room</span>
            <span class="card-value"></span>
          </div>
        </div>

        <p id="suspicion-status" class="waiting-text">
          ....Waiting for players to disprove
        </p>
        <button id="close-modal" style="display: none">OK</button>
      </div>
    </template>

    <template id="accusation-template">
      <article id="accusation-popup">
        <div id="popup-content">
          <form action="" id="accusation-details">
            <legend>Suspects</legend>
            <div class="options" id="suspects"></div>
            <legend>Weapons</legend>
            <div class="options" id="weapons"></div>
            <legend>Rooms</legend>
            <div class="options" id="rooms"></div>
            <div id="actions">
              <button type="reset">Reset</button>
              <button type="submit">Accuse</button>
            </div>
          </form>
          <section id="envelop-container">
            <div id="envelop"></div>
          </section>
        </div>
      </article>
    </template>

    <template id="option-template">
      <div class="option">
        <input type="radio" />
        <label></label>
      </div>

    <template id="weapon-popup-temp">

      <div class="weapon-cards-row" id="weapon-cards-row"></div>
      <div class="weapon-popup-actions">
